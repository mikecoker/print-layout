name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }} Release
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            artifact_name: macos-release
          - name: Windows
            os: windows-latest
            artifact_name: windows-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Prepare macOS release artifacts
        if: matrix.platform.os == 'macos-latest'
        run: |
          mkdir -p release-artifacts
          APP_PATH="src-tauri/target/release/bundle/macos/Aegis Print Layout.app"
          ZIP_PATH="release-artifacts/Aegis-Print-Layout-macos.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
          find "src-tauri/target/release/bundle/dmg" -maxdepth 1 -name "*.dmg" -exec cp {} release-artifacts/ \;

      - name: Prepare Windows release artifacts
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          $exePath = "src-tauri/target/release/aegis-print-layout.exe"
          if (Test-Path $exePath) {
            Compress-Archive -Path $exePath -DestinationPath "release-artifacts/Aegis-Print-Layout-windows.zip" -Force
          }
          Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Include *.msi,*.exe | ForEach-Object {
            Copy-Item $_.FullName -Destination "release-artifacts" -Force
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: release-artifacts/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
